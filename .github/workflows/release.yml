name: Release

# Publish a GitHub Release whenever a version tag is pushed. The committed VERSION file is the
# single source of truth for the product version; this workflow refuses to publish unless the
# pushed tag equals VERSION. No build artifact is uploaded — the tool is installed with uv
# directly from the git source (`uv tool install --from git+<repo>@<tag>`). The published
# Release is what the tool's version check discovers via GitHub's /releases/latest.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify VERSION matches the release tag
        # VERSION is the single source of truth. Bump it in a PR before tagging (see
        # CONTRIBUTING.md); this gate fails the release if the tag and VERSION disagree,
        # so the committed version, the git tag, and the installed version can never drift.
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ "$TAG" != "$FILE_VERSION" ]; then
            echo "::error::Release tag '$TAG' does not match VERSION file ('$FILE_VERSION'). Bump VERSION in a PR before tagging." >&2
            exit 1
          fi
          echo "VERSION ($FILE_VERSION) matches tag ($TAG)."

      - name: Publish GitHub Release
        # Creates the Release object for this tag (no assets). The tool's version check relies on
        # a published Release existing so GitHub's /releases/latest resolves.
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
